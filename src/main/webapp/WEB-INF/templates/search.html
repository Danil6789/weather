<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Tracker - Поиск</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container py-4">
    <div th:if="${locations.isEmpty()}" class="alert alert-warning">
        По запросу "<span th:text="${queryName}"></span>" ничего не найдено.юююююююююююю
    </div>
    <div class="row">
        <div class="col-md-4 col-lg-3 mb-4" th:each="location : ${locations}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${location.name}"></h5>
                    <p class="card-text">
                        <span th:text="${location.country}"></span>
                        <span th:if="${location.state != null}" th:text="', ' + ${location.state}" class="text-muted"></span>
                    </p>
                    <form method="post" th:action="@{/locations}" class="mt-3">
                        <input type="hidden" name="name" th:value="${location.name}">
                        <input type="hidden" name="latitude" th:value="${location.lat}">
                        <input type="hidden" name="longitude" th:value="${location.lon}">
                        <button class="btn btn-primary btn-sm w-100" type="submit">Add to tracked locations</button>
                      </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
