services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - weather-network
    environment:
      - DB_HOST=db
      - DB_NAME=weather_db
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=weather_db
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - weather-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./src/main/webapp/resources/css:/usr/share/nginx/html/css
      - ./src/main/webapp/resources/images:/usr/share/nginx/html/images
    depends_on:
      - app
    networks:
      - weather-network

volumes:
  postgres-data:

networks:
  weather-network: