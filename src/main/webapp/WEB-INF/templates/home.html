<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Tracker - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .weather-card {
            transition: transform 0.2s;
            border-radius: 15px;
            overflow: hidden;
        }
        .weather-card:hover {
            transform: translateY(-5px);
        }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<section id="page-content">
    <div class="container mt-4">
        <div th:if="${user != null and forecasts.isEmpty()}" class="alert alert-info text-center">
            No locations added yet. Use search above to add cities.
        </div>

        <div th:if="${user != null and not forecasts.isEmpty()}">
            <div class="row">
                <div class="col-12 col-lg-3 col-md-6 mb-4" th:each="forecast : ${forecasts}">
                    <div class="card h-100 position-relative weather-card shadow-sm">
                        <div class="delete-btn">
                            <form method="post" th:action="@{'/locations/' + ${forecast.locationId}}">
                                <input type="hidden" name="_method" value="DELETE">
                                <button class="btn btn-sm btn-outline-danger rounded-circle" type="submit" title="Delete">✕</button>
                            </form>
                        </div>

                        <img class="card-img-top img-fluid p-3"
                             th:src="@{'https://openweathermap.org/img/wn/' + ${forecast.weather.weather[0].icon} + '@4x.png'}"
                             alt="Weather icon"
                             style="width: 100px; height: 100px; margin: 0 auto;">

                        <div class="card-body text-center">
                            <h3 class="card-title" th:text="${forecast.weather.name}"></h3>

                            <h1 class="card-text display-4" th:text="${forecast.weather.main.temp} + '°C'"></h1>

                            <p class="card-text">
                                Feels like: <span th:text="${forecast.weather.main.feelsLike} + '°C'"></span>
                            </p>

                            <p class="card-text text-muted" th:text="${forecast.weather.weather[0].description}"></p>

                            <hr>

                            <div class="row">
                                <div class="col-6">
                                    <p class="small mb-1">Humidity</p>
                                    <p class="small fw-bold" th:text="${forecast.weather.main.humidity} + '%'"></p>
                                </div>
                                <div class="col-6 mt-2">
                                    <p class="small mb-1">Wind</p>
                                    <p class="small fw-bold" th:text="${forecast.weather.wind.speed} + ' m/s'"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:unless="${user != null}" class="text-center py-5">
            <h3>Welcome to Weather Tracker</h3>
            <p class="text-muted">Please <a href="/auth/login">sign in</a> to add locations and track weather.</p>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
