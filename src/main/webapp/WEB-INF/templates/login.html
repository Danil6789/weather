<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .card {
            border-radius: 20px;
            overflow: hidden;
        }
        .card-header {
            border-radius: 0;
        }
        .form-control {
            border-radius: 10px;
        }
        .btn {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm" style="border-radius: 20px;">
                <div class="card-header bg-primary text-white text-center py-3" style="border-radius: 20px 20px 0 0;">
                    <h4 class="mb-0">Sign In</h4>
                </div>
                <div class="card-body p-4">

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${param.logout}" class="alert alert-info">You have been signed out.</div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/auth/login}" method="post" th:object="${userLoginDto}">
                        <input type="hidden" name="redirect" th:value="${redirect}">

                        <div class="mb-3">
                            <label class="form-label">Login</label>
                            <input type="text" th:field="*{login}" class="form-control" placeholder="Enter login">
                            <div th:if="${#fields.hasErrors('login')}" th:errors="*{login}" class="text-danger small"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Enter password">
                            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-danger small"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
                    </form>

                    <div class="text-center mt-3">
                        <small>Don't have an account? <a href="/auth/register" class="text-decoration-none">Sign up</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
